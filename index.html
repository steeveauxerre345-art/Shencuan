<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>沈川个人分享页</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:"PingFang SC",Microsoft YaHei,sans-serif}
    body{background:#f6f7fb;padding:30px 16px;color:#333;max-width:800px;margin:0 auto;position:relative;overflow-x:hidden}
    #feather-container{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      pointer-events:none;
      z-index:999;
      overflow:hidden
    }
    .feather{
      position:absolute;
      font-size:11px;
      opacity:0.82;
      animation:featherFall linear infinite;
      will-change: transform;
    }
    .feather svg{
      width:11px;
      height:11px;
      fill:#ffffff;
    }
    #float-text-container{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      pointer-events:none;
      z-index:1;
      overflow:hidden
    }
    .float-nb{
      position:absolute;
      font-size:22px;
      font-weight:bold;
      white-space:nowrap;
      will-change: transform,color;
      animation:floatNbUp 8s linear infinite, colorAnim 3s ease-in-out infinite;
    }
    @keyframes floatNbUp{
      0%{transform:translateY(100vh);opacity:0}
      10%{opacity:1}
      90%{opacity:1}
      100%{transform:translateY(-20vh);opacity:0}
    }
    @keyframes featherFall{
      0%{transform:translateY(-10vh) translateX(0) rotate(0deg);opacity:0}
      8%{opacity:0.82}
      92%{opacity:0.82}
      100%{transform:translateY(110vh) translateX(25px) rotate(360deg);opacity:0}
    }
    .header{text-align:center;margin-bottom:40px;position:relative;z-index:2}
    .logo-box{
      width:110px;height:110px;border-radius:28px;
      background:linear-gradient(135deg,#7b61ff,#ff66cc);
      margin:0 auto 16px;display:flex;align-items:center;justify-content:center;
      box-shadow:0 8px 30px rgba(123,97,255,0.35);
      font-size:42px;color:white;font-weight:bold
    }
    .title{font-size:32px;font-weight:bold;background:linear-gradient(90deg,#7b61ff,#ff5599);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .qq-box{
      display:inline-block;margin-top:14px;padding:10px 22px;
      background:white;border-radius:50px;box-shadow:0 2px 8px #00000012;
      font-size:17px
    }
    .resource-title{
      font-size:22px;
      margin-bottom:16px;
      display:flex;
      align-items:center;
      gap:8px;
      position:relative;z-index:2
    }
    .item-card{
      background:white;border-radius:16px;margin-bottom:18px;
      box-shadow:0 3px 12px #0000000f;overflow:hidden;position:relative;z-index:2
    }
    .card-head{
      padding:18px 20px;display:flex;justify-content:space-between;align-items:center;
      font-size:20px;font-weight:bold;cursor:pointer
    }
    .card-body{padding:0 20px 22px;display:none}
    .desc{color:#666;line-height:1.6;margin-bottom:18px}
    .btn-group{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px}
    .btn{
      padding:14px 0;border:none;border-radius:12px;color:white;
      font-size:16px;font-weight:bold;cursor:pointer
    }
    .btn-quark{background:#ff6347}
    .btn-xunlei{background:#22a7ff}
    .btn-tutorial{background:#17c37b}
    .btn-123{background:#f7941d}
    .btn-qq{background:#12B7F5}
    .btn-ks{background:#FF2E4D}
    .btn-douyin{background:#000000}
    .btn-shop1{background:#9933ff}
    .btn-shop2{background:#ff3388}
    .active .card-body{display:block}
    .modal-mask{
      position:fixed;top:0;left:0;width:100%;height:100%;
      background:rgba(0,0,0,0.5);display:none;place-items:center;z-index:1000
    }
    .modal-box{
      width:85%;max-width:420px;background:#fff;border-radius:16px;padding:24px;
    }
    .modal-title{font-size:20px;font-weight:bold;margin-bottom:12px}
    .modal-account{
      font-size:16px;padding:12px;background:#f5f5f5;border-radius:8px;margin:16px 0;
      word-break:break-all;line-height:1.5
    }
    .modal-tip{color:#666;margin-bottom:12px}
    .modal-btn-row{display:flex;gap:10px;margin-bottom:12px}
    .copy-btn{flex:1;padding:10px;background:#12B7F5;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer}
    .modal-close{
      width:100%;padding:12px;background:#7b61ff;color:#fff;border:none;
      border-radius:8px;font-size:16px;cursor:pointer
    }
  </style>
</head>
<body>
<div id="feather-container"></div>
<div id="float-text-container"></div>

<div class="header">
  <div class="logo-box">SC</div>
  <h1 class="title">沈川个人分享页 ✅</h1>
  <div class="qq-box">资源持续更新中</div>
</div>

<div class="resource-wrap">
  <h2 class="resource-title">📦 资源列表</h2>

  <div class="item-card active">
    <div class="card-head" onclick="toggleCard(this.parentElement)">
      <span>📞 本人联系方式</span>
      <span>⌃</span>
    </div>
    <div class="card-body">
      <p class="desc">点击查看账号，可复制后前往对应软件手动添加</p>
      <div class="btn-group">
        <button class="btn btn-qq" onclick="showModal('QQ账号','2181678878')">QQ联系</button>
        <button class="btn btn-ks" onclick="showModal('快手账号','jhx1103010')">快手主页</button>
        <button class="btn btn-douyin" onclick="showModal('抖音账号','jhx110412')">抖音主页</button>
      </div>
    </div>
  </div>

  <div class="item-card">
    <div class="card-head" onclick="toggleCard(this.parentElement)">
      <span>工具名称</span>
      <span>⌄</span>
    </div>
    <div class="card-body">
      <p class="desc">各种刷机调度隐藏等文件</p>
      <div class="btn-group">
        <button class="btn btn-123" onclick="window.open('https://123pan.cn/s/6Oo2Td-nrkfh')">123云盘</button>
        <button class="btn btn-quark" onclick="alert('链接后期添加')">夸克网盘</button>
        <button class="btn btn-xunlei" onclick="alert('链接后期添加')">迅雷网盘</button>
        <button class="btn btn-tutorial" onclick="alert('教程暂未开放，敬请期待')">使用教程</button>
      </div>
    </div>
  </div>

  <h2 class="resource-title">🛒 商品购买链接分类</h2>
  <div class="item-card">
    <div class="card-head" onclick="toggleCard(this.parentElement)">
      <span>刷机调度系列卡密购买渠道</span>
      <span>⌄</span>
    </div>
    <div class="card-body">
      <p class="desc">刷机、调度等系列产品购买链接</p>
      <div class="btn-group">
        <button class="btn btn-shop1" onclick="window.open('https://816.jytos.cn/shop/UUTW370N','_blank')">渠道一 发卡网</button>
        <button class="btn btn-shop2" onclick="window.open('https://www.jifaka.cn/shop/KV32PEMS','_blank')">渠道二 发卡网</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-mask" id="accountModal">
  <div class="modal-box">
    <div class="modal-title" id="mTitle"></div>
    <div class="modal-account" id="mAccount"></div>
    <div class="modal-tip">复制账号，打开对应APP手动搜索添加</div>
    <div class="modal-btn-row">
      <button class="copy-btn" onclick="copyAccount()">一键复制</button>
    </div>
    <button class="modal-close" onclick="closeModal()">关闭</button>
  </div>
</div>

<script>
const featherContainer = document.getElementById('feather-container');
const floatTextContainer = document.getElementById('float-text-container');
const colorList = [
  '#ff5599','#7b61ff','#22a7ff','#ff6347','#17c37b',
  '#ff0066','#00ccff','#ffcc00','#ff3300','#9900ff',
  '#ff66b2','#6600cc','#0066ff','#ff9900','#00cc99',
  '#ff3366','#330099','#0099ff','#ffcc33','#009933',
  '#ff80bf','#9933ff','#3399ff','#ff6600','#00ff99'
];
function getRandomLeft(){
  const w = window.innerWidth;
  const area = Math.random();
  if(area < 0.30){
    return Math.random() * (w * 0.45);
  }else if(area < 0.52){
    return Math.random() * (w * 0.45);
  }else if(area < 0.76){
    return w*0.45 + Math.random()*(w*0.53);
  }else{
    return w*0.45 + Math.random()*(w*0.53);
  }
}
function createFeather(){
  const feather = document.createElement('div');
  feather.className = 'feather';
  feather.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 2C8 2 4 5 4 9c0 2.5 2 4.5 4 6l2 6 2-6c2-1.5 4-3.5 4-6 0-4-4-7-8-7z" /></svg>`;
  feather.style.left = Math.random() * window.innerWidth + 'px';
  feather.style.animationDuration = (Math.random()*3 + 4)+'s';
  featherContainer.appendChild(feather);
  setTimeout(()=>feather.remove(),8000);
}
setInterval(createFeather,140);
function createFloatText(){
  const el = document.createElement('div');
  el.className = 'float-nb';
  el.innerText = '沈川 nb';
  const randomColor1 = colorList[Math.floor(Math.random()*colorList.length)];
  const randomColor2 = colorList[Math.floor(Math.random()*colorList.length)];
  const randomColor3 = colorList[Math.floor(Math.random()*colorList.length)];
  const randomColor4 = colorList[Math.floor(Math.random()*colorList.length)];
  const randomColor5 = colorList[Math.floor(Math.random()*colorList.length)];
  const aniName = 'color_' + Date.now() + Math.floor(Math.random()*9999);
  const styleSheet = document.styleSheets[0];
  const keyframes = `@keyframes ${aniName}{
    0%{color:${randomColor1}}
    25%{color:${randomColor2}}
    50%{color:${randomColor3}}
    75%{color:${randomColor4}}
    100%{color:${randomColor5}}
  }`;
  styleSheet.insertRule(keyframes, styleSheet.cssRules.length);
  el.style.left = getRandomLeft() + 'px';
  el.style.animationDuration = (Math.random()*4+6)+'s';
  el.style.animationName = `floatNbUp,${aniName}`;
  floatTextContainer.appendChild(el);
  setTimeout(()=>el.remove(),10000);
}
setInterval(createFloatText,430);
function toggleCard(currentCard){
  const allCards = document.querySelectorAll('.item-card');
  const isOpen = currentCard.classList.contains('active');
  allCards.forEach(card=>{
    card.classList.remove('active');
    card.querySelector('.card-head span:last-child').innerText = '⌄';
  })
  if(!isOpen){
    currentCard.classList.add('active');
    currentCard.querySelector('.card-head span:last-child').innerText = '⌃';
  }
}
let currentCopyText = '';
function showModal(title,account){
  currentCopyText = account;
  document.getElementById('mTitle').innerText = title;
  document.getElementById('mAccount').innerText = account;
  document.getElementById('accountModal').style.display = 'grid';
}
function copyAccount(){
  navigator.clipboard.writeText(currentCopyText).then(()=>{
    alert('账号复制成功，前往APP搜索');
  }).catch(()=>alert('复制失败，手动复制文字'));
}
function closeModal(){
  document.getElementById('accountModal').style.display = 'none';
}
</script>
</body>
</html>
